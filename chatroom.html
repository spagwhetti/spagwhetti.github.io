<!DOCTYPE html>
<html>
<head>
  <title>Chatroom</title>
  <style>
    #chatbox {
      height: 300px;
      overflow-y: scroll;
    }
  </style>
</head>
<body>
  <div id="chatbox">
    <p>Welcome to the chatroom!</p>
  </div>
  <form action="#">
    <div>
      <input type="text" id="message" placeholder="Enter your message" style="height: 300px; overflow-y: scroll;" autocomplete="off">
      <input type="submit" value="Send">
    </div>
  </form>
  <script src="chatroom.js"></script>
</body>
</html>
